services:
  # ─────────────────────────────────────────
  # Database
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: laravelms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - laravelms_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10

  # ─────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: laravelms_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin_secret}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - laravelms_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # Authentication (Keycloak)
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    container_name: laravelms_keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_secret
      KC_DB: dev-mem
    volumes:
      - ./infrastructure/keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    networks:
      - laravelms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # Product Service
  # ─────────────────────────────────────────
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: laravelms_product_service
    restart: unless-stopped
    environment:
      APP_NAME: "Product Service"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://product-service:8000
      APP_PORT: 8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: product_db
      DB_USERNAME: ${MYSQL_USER:-app_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-app_secret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin_secret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-inventory-management}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-inventory-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-your-client-secret}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service:8000}
    volumes:
      - ./services/product-service:/var/www/html
    ports:
      - "8001:8000"
    networks:
      - laravelms_network
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Inventory Service
  # ─────────────────────────────────────────
  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: laravelms_inventory_service
    restart: unless-stopped
    environment:
      APP_NAME: "Inventory Service"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://inventory-service:8000
      APP_PORT: 8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: inventory_db
      DB_USERNAME: ${MYSQL_USER:-app_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-app_secret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin_secret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-inventory-management}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-inventory-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-your-client-secret}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8000}
    volumes:
      - ./services/inventory-service:/var/www/html
    ports:
      - "8002:8000"
    networks:
      - laravelms_network
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Order Service
  # ─────────────────────────────────────────
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: laravelms_order_service
    restart: unless-stopped
    environment:
      APP_NAME: "Order Service"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://order-service:8000
      APP_PORT: 8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: order_db
      DB_USERNAME: ${MYSQL_USER:-app_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-app_secret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin_secret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-inventory-management}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-inventory-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-your-client-secret}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8000}
      INVENTORY_SERVICE_URL: ${INVENTORY_SERVICE_URL:-http://inventory-service:8000}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8000}
    volumes:
      - ./services/order-service:/var/www/html
    ports:
      - "8003:8000"
    networks:
      - laravelms_network
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─────────────────────────────────────────
  # User Service
  # ─────────────────────────────────────────
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: laravelms_user_service
    restart: unless-stopped
    environment:
      APP_NAME: "User Service"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://user-service:8000
      APP_PORT: 8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: user_db
      DB_USERNAME: ${MYSQL_USER:-app_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-app_secret}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin_secret}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-inventory-management}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-inventory-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-your-client-secret}
    volumes:
      - ./services/user-service:/var/www/html
    ports:
      - "8004:8000"
    networks:
      - laravelms_network
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Frontend (React)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: laravelms_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost/api
      REACT_APP_KEYCLOAK_URL: http://localhost:8080
      REACT_APP_KEYCLOAK_REALM: inventory-management
      REACT_APP_KEYCLOAK_CLIENT_ID: frontend-app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - laravelms_network

  # ─────────────────────────────────────────
  # API Gateway / Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: laravelms_nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    networks:
      - laravelms_network
    depends_on:
      - product-service
      - inventory-service
      - order-service
      - user-service
      - frontend

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  laravelms_network:
    driver: bridge

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  rabbitmq_data:
    driver: local
